name: Submit Commit

on:
  push:
    branches:
      - main

jobs:
  submit:
    runs-on: ubuntu-latest

    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Send valid commit
        run: |
          set -euo pipefail

          # Extract commits from push event
          if ! commits=$(jq -c '.commits[]' "$GITHUB_EVENT_PATH"); then
            echo "No commits found"
            exit 0
          fi

          for commit in $commits; do
            ts=$(jq -r '.timestamp' <<<"$commit")

            # Extract minute
            minute=$(date -u -d "$ts" +%M)
            minute=$((10#$minute))

            # Only first 10 minutes
            if [ "$minute" -lt 10 ]; then
              echo "Valid commit found → sending to server"

              curl --retry 5 --retry-delay 5 -X POST https://gitworkshop-2.onrender.com/submit \
                -H "Content-Type: application/json" \
                -d "{
                  \"user\": \"${GITHUB_ACTOR}\",
                  \"repo\": \"${GITHUB_REPOSITORY}\",
                  \"commit\": \"$(jq -r '.id' <<<"$commit")\",
                  \"timestamp\": \"${ts}\"
                }"

              exit 0
            fi
          done

          echo "No valid commits in first 10 minutes"